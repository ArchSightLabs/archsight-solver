name: CI

on:
  pull_request:
  push:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081

      - name: Install dependencies
        run: uv sync --frozen

      - name: Verify Docker requirements export
        run: |
          uv export --frozen --no-dev --no-emit-project --format requirements-txt --no-header --output-file /tmp/requirements.txt
          tail -n +3 requirements.txt > /tmp/requirements.current.txt
          diff -u /tmp/requirements.current.txt /tmp/requirements.txt

      - name: Verify release metadata
        run: |
          python scripts/check_versions.py
          python scripts/check_release_gate.py

      - name: Run backend tests
        run: uv run python -m pytest backend/tests -q

      - name: Generate benchmark validation report
        run: uv run python -m backend.benchmarks.report --output /tmp/benchmark-validation-report.md

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate

      - name: Build
        run: npm run build

      - name: Verify generated release notes are current
        run: git diff --exit-code -- public/docs/release-notes.md public/docs/release-notes.html

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run release workbench smoke
        run: |
          npm run test:visual -- release-1-6-2-acceptance.spec.ts --project=chromium --workers=1
          npm run test:visual -- release-1-6-1-host-reference.spec.ts --project=chromium --workers=1
          npm run test:visual -- release-1-6-host-integration.spec.ts --project=chromium --workers=1
          npm run test:visual -- release-1-5-quick-modeling.spec.ts --project=chromium --workers=1
          npm run test:visual -- release-1-5-load-scenarios.spec.ts --project=chromium --workers=1

  docker:
    name: Docker Release Gate
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install container Host E2E dependencies
        run: |
          npm --prefix frontend ci
          npm --prefix frontend exec playwright install --with-deps chromium

      - name: Build release image
        run: docker build --tag archsight-solver:release-gate .

      - name: Run container health smoke
        run: |
          docker run --detach --name solver-release-gate \
            --publish 127.0.0.1:6280:6240 \
            --env ARCHSIGHT_SOLVER_HOST_ALLOWED_ORIGINS=http://127.0.0.1:6250 \
            archsight-solver:release-gate
          for attempt in $(seq 1 20); do
            status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' solver-release-gate)"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            if [ "$status" = "unhealthy" ]; then
              docker logs solver-release-gate
              exit 1
            fi
            sleep 3
          done
          docker logs solver-release-gate
          exit 1

      - name: Run built image Host integration
        env:
          ARCHSIGHT_SOLVER_E2E_URL: http://127.0.0.1:6280
        run: >-
          npm --prefix frontend run test:visual --
          release-1-6-2-acceptance.spec.ts
          --project=chromium
          --workers=1
          --grep "同一 canonical 工程在嵌入工作台"

      - name: Remove smoke container
        if: always()
        run: docker rm --force solver-release-gate || true
