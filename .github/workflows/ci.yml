name: CI

on:
  pull_request:
  push:
    branches: ["main", "master"]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081

      - name: Install dependencies
        run: uv sync --frozen

      - name: Verify Docker requirements export
        run: |
          uv export --frozen --no-dev --no-emit-project --format requirements-txt --no-header --output-file /tmp/requirements.txt
          tail -n +3 requirements.txt > /tmp/requirements.current.txt
          diff -u /tmp/requirements.current.txt /tmp/requirements.txt

      - name: Run backend tests
        run: uv run python -m pytest backend/tests -q

      - name: Generate benchmark validation report
        run: uv run python -m backend.benchmarks.report --output /tmp/benchmark-validation-report.md

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build
