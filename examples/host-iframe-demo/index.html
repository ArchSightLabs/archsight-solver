<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ArchSight Solver Reference Host</title>
    <style>
      :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; background: #e2e8f0; color: #0f172a; }
      main { display: grid; grid-template-columns: 360px minmax(0, 1fr); min-height: 100vh; }
      aside { overflow: auto; max-height: 100vh; padding: 18px; border-right: 1px solid #cbd5e1; background: #fff; }
      h1 { margin: 0 0 6px; font-size: 20px; }
      h2 { margin: 20px 0 8px; font-size: 14px; }
      p { margin: 0 0 14px; color: #475569; font-size: 13px; line-height: 1.55; }
      dl { display: grid; grid-template-columns: 90px 1fr; gap: 7px 10px; margin: 0; font-size: 12px; }
      dt { color: #64748b; }
      dd { overflow-wrap: anywhere; margin: 0; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
      .status { display: inline-flex; margin-bottom: 14px; border-radius: 999px; padding: 5px 10px; background: #fef3c7; color: #92400e; font-size: 12px; font-weight: 700; }
      .status[data-connected="true"] { background: #dcfce7; color: #166534; }
      .toolbar { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
      button { border: 1px solid #0f766e; border-radius: 6px; padding: 8px 9px; background: #0f766e; color: #fff; cursor: pointer; font: inherit; font-size: 12px; font-weight: 700; }
      button.secondary { background: #fff; color: #0f766e; }
      pre { overflow: auto; max-height: 34vh; margin: 0; border-radius: 7px; padding: 10px; background: #0f172a; color: #e2e8f0; white-space: pre-wrap; word-break: break-word; font-size: 11px; }
      iframe { width: 100%; height: 100vh; border: 0; background: #fff; }
      @media (max-width: 900px) { main { grid-template-columns: 1fr; } aside { max-height: none; } iframe { height: 78vh; } }
    </style>
  </head>
  <body>
    <main>
      <aside>
        <h1>Solver Reference Host</h1>
        <p>真实双 origin 的中性宿主：加载项目、接收变更、托管保存，并在刷新后重新打开。</p>
        <div id="connectionStatus" class="status" data-connected="false">等待 Solver</div>
        <dl>
          <dt>Host origin</dt><dd id="hostOrigin"></dd>
          <dt>Solver origin</dt><dd id="solverOrigin"></dd>
          <dt>Session</dt><dd id="sessionId"></dd>
          <dt>Mode</dt><dd id="mode">editable</dd>
          <dt>Revision</dt><dd id="revision">0</dd>
          <dt>Project</dt><dd id="projectName">载入中</dd>
          <dt>均布荷载 q</dt><dd id="uniformLoad">-</dd>
        </dl>
        <div class="toolbar">
          <button id="launchEditable">可编辑打开</button>
          <button id="launchReadonly" class="secondary">只读打开</button>
          <button id="reloadFrame" class="secondary">重载 iframe</button>
          <button id="clearSaved" class="secondary">清除本地保存</button>
        </div>
        <h2>协议消息日志</h2>
        <pre id="log" aria-live="polite"></pre>
      </aside>
      <iframe id="solverFrame" title="ArchSight Solver"></iframe>
    </main>
    <script type="module" src="./host.js"></script>
  </body>
</html>
