<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ArchSight Solver Reference Host</title>
    <style>
      :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; background: #e8edf4; color: #0f172a; }
      button { border: 1px solid #cbd5e1; border-radius: 8px; padding: 8px 12px; background: #fff; color: #334155; cursor: pointer; font: inherit; font-size: 12px; font-weight: 750; }
      button:hover { border-color: #0f766e; color: #0f766e; }
      button.primary { border-color: #0f766e; background: #0f766e; color: #fff; }
      button.primary:hover { background: #115e59; color: #fff; }
      .shell { display: grid; grid-template-rows: auto minmax(0, 1fr); min-height: 100vh; }
      .hostbar { position: relative; z-index: 3; display: flex; min-height: 68px; align-items: center; gap: 18px; border-bottom: 1px solid #cbd5e1; padding: 10px 16px; background: rgba(255,255,255,.96); box-shadow: 0 4px 18px rgba(15,23,42,.06); }
      .brand { min-width: 190px; }
      .brand strong { display: block; font-size: 16px; }
      .brand span { color: #64748b; font-size: 11px; }
      .project { min-width: 0; flex: 1; }
      .project strong { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 14px; }
      .project-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; color: #64748b; font-size: 11px; }
      .status { border-radius: 999px; padding: 3px 8px; background: #fef3c7; color: #92400e; font-weight: 800; }
      .status[data-connected="true"] { background: #dcfce7; color: #166534; }
      .notice { color: #b91c1c; font-weight: 750; }
      .actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 7px; }
      .workspace { position: relative; min-height: 0; }
      iframe { display: block; width: 100%; height: calc(100vh - 68px); border: 0; background: #fff; }
      .diagnostics { position: absolute; z-index: 4; top: 14px; right: 14px; bottom: 14px; width: min(390px, calc(100vw - 28px)); overflow: auto; border: 1px solid #cbd5e1; border-radius: 12px; padding: 16px; background: rgba(255,255,255,.98); box-shadow: 0 22px 60px rgba(15,23,42,.2); }
      .diagnostics[hidden] { display: none; }
      .diagnostics-head { display: flex; align-items: start; justify-content: space-between; gap: 12px; }
      h2 { margin: 0; font-size: 15px; }
      h3 { margin: 18px 0 8px; font-size: 13px; }
      p { margin: 5px 0 0; color: #64748b; font-size: 12px; line-height: 1.5; }
      dl { display: grid; grid-template-columns: 88px 1fr; gap: 7px 9px; margin: 15px 0 0; font-size: 11px; }
      dt { color: #64748b; }
      dd { overflow-wrap: anywhere; margin: 0; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
      .diagnostic-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 14px; }
      pre { overflow: auto; max-height: 42vh; margin: 0; border-radius: 8px; padding: 10px; background: #0f172a; color: #e2e8f0; white-space: pre-wrap; word-break: break-word; font-size: 10px; }
      @media (max-width: 980px) {
        .hostbar { align-items: flex-start; flex-wrap: wrap; }
        .project { order: 3; flex-basis: 100%; }
        .actions { margin-left: auto; }
        iframe { height: calc(100vh - 112px); }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="hostbar">
        <div class="brand">
          <strong>Reference Host 工程台</strong>
          <span>工程生命周期由宿主管理</span>
        </div>
        <div class="project">
          <strong id="projectName">载入工程中</strong>
          <div class="project-meta">
            <span id="connectionStatus" class="status" data-connected="false">等待 Solver</span>
            <span id="saveState">未保存</span>
            <span>Revision <b id="revision">0</b></span>
            <span id="uniformLoad">均布荷载 -</span>
            <span id="operationNotice" class="notice" hidden></span>
          </div>
        </div>
        <div class="actions">
          <button id="newProject">新建工程</button>
          <button id="openProject">打开工程</button>
          <input id="projectFileInput" type="file" accept=".slv,.json,application/json" hidden />
          <button id="hostSave" class="primary">保存工程</button>
          <button id="launchReadonly">只读审阅</button>
          <button id="launchEditable">继续编辑</button>
          <button id="toggleDiagnostics" aria-expanded="false">接入诊断</button>
        </div>
      </header>
      <section class="workspace">
        <iframe id="solverFrame" title="ArchSight Solver 嵌入式结构分析工作台"></iframe>
        <aside id="diagnostics" class="diagnostics" hidden>
          <div class="diagnostics-head">
            <div>
              <h2>Host Protocol 诊断</h2>
              <p>开发接入信息默认收起，不属于最终业务界面。</p>
            </div>
            <button id="closeDiagnostics" aria-label="关闭接入诊断">关闭</button>
          </div>
          <dl>
            <dt>Host origin</dt><dd id="hostOrigin"></dd>
            <dt>Solver origin</dt><dd id="solverOrigin"></dd>
            <dt>Session</dt><dd id="sessionId"></dd>
            <dt>Mode</dt><dd id="mode">editable</dd>
          </dl>
          <div class="diagnostic-actions">
            <button id="reloadFrame">重载 iframe</button>
            <button id="clearSaved">清除本地保存</button>
          </div>
          <h3>协议消息日志</h3>
          <pre id="log" aria-live="polite"></pre>
        </aside>
      </section>
    </main>
    <script type="module" src="./host.js"></script>
  </body>
</html>
